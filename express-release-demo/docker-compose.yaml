services:
  express-app:
    image: ${DOCKERHUB_USERNAME}/express-release-demo:latest
    container_name: express-release-demo
    ports:
      - "8080:8080"
    environment:
      APP_MESSAGE: ${APP_MESSAGE:-Hello from Watchtower}
    restart: unless-stopped

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup express-release-demo
    restart: unless-stopped
